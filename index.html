    }

    .subtitle {

      color: #64748b;
      margin-bottom: 25px;
      font-size: 16px;
    }

    .week-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 25px;
      justify-content: center;
    }

    .week-btn {
      background: #eef2ff;
      color: #1e3a8a;
      border: 2px solid #1e3a8a;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .week-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(30, 58, 138, 0.2);
    }

    .week-btn.active {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .topic {
      font-size: 15px;
      color: #475569;
      font-weight: bold;
    }

    .badge {
      background: #dbeafe;
      color: #1e40af;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }

    .progress-wrap {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 20px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #2563eb);
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .definition-toggle {
      background: #dbeafe;
      color: #1e3a8a;
      border: 2px solid #1e3a8a;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .definition-toggle:hover {
      background: #bfdbfe;
    }

    .definition {
      display: none;
      background: linear-gradient(135deg, #eff6ff, #eef2ff);
      padding: 18px;
      border-left: 6px solid #2563eb;
      margin-bottom: 24px;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 17px;
    }

    .definition.show {
      display: block;
    }

    .question {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 18px;
      color: #111827;
    }

    .option {
      display: block;
      width: 100%;
      padding: 15px 16px;
      margin: 10px 0;
      border: 2px solid #d1d5db;
      border-radius: 14px;
      background: white;
      cursor: pointer;
      text-align: left;
      font-size: 17px;
      transition: 0.2s ease;
    }

    .option:hover {
      background: #f8fafc;
      transform: translateX(5px);
      border-color: #2563eb;
    }

    .correct {
      background: #dcfce7 !important;
      border-color: #22c55e !important;
      color: #14532d;
      font-weight: bold;
    }

    .wrong {
      background: #fee2e2 !important;
      border-color: #ef4444 !important;
      color: #7f1d1d;
      font-weight: bold;
    }

    #feedback {
      margin-top: 16px;
      font-weight: bold;
      font-size: 18px;
      min-height: 28px;
    }

    .buttons {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
    }

    #nextBtn {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      font-weight: bold;
    }

    #restartBtn {
      background: #475569;
      color: white;
      font-weight: bold;
    }

      opacity: 0.9;
      transform: translateY(-1px);
    }

    .score {
      margin-top: 18px;
      font-size: 16px;
      color: #334155;
      font-weight: bold;
    }

    .final-card {
      text-align: center;
      padding: 25px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ecfdf5, #eff6ff);
      border: 2px solid #bfdbfe;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .container {
        padding: 20px;
      }

      h1 {
        font-size: 30px;
      }

      .question {
        font-size: 20px;
      }
    }
  </style>
</head>

          options: ["MT101", "MT910", "MT103", "MT199"],
          answer: 2
        },
        {
          topic: "Week 2 - Payment Routing - Two Correspondent Banks",
          definition: "Field 50a is Ordering Customer. Field 56a is Intermediary Institution. Field 57a is Account with Institution. Field 59a is Beneficiary Customer.",
          question: "Which SWIFT field represents the ordering customer?",
          options: ["Field 56a", "Field 57a", "Field 50a", "Field 59a"],
          answer: 2
        },
        {
          topic: "Week 2 - Payment Routing - Two Correspondent Banks",
          definition: "Field 50a is Ordering Customer. Field 56a is Intermediary Institution. Field 57a is Account with Institution. Field 59a is Beneficiary Customer.",
          question: "Which field represents the intermediary institution?",
          options: ["Field 50a", "Field 56a", "Field 57a", "Field 59a"],
          answer: 1
        },
        {
          topic: "Week 2 - Payment Routing - Two Correspondent Banks",
          definition: "Routing chain: BNP Paribas → Wells Fargo → Bank of New York Mellon → Santander ES → Beneficiary.",
          question: "Who does BNP Paribas send the message to first?",
          options: ["Bank of New York Mellon", "Santander ES", "Wells Fargo", "Beneficiary"],
          answer: 2
        }
      ]
    };

    let selectedWeek = "week1";
    let currentQuestion = 0;
    let score = 0;
    let answered = false;
    let definitionVisible = false;

    function getCurrentQuiz() {
      return quizzes[selectedWeek];
    }

    function selectWeek(week) {
      selectedWeek = week;
      currentQuestion = 0;
      score = 0;

      document.getElementById("week1Btn").classList.remove("active");
      document.getElementById("week2Btn").classList.remove("active");
      document.getElementById(week + "Btn").classList.add("active");

      loadQuestion();
    }

    function loadQuestion() {
      answered = false;
      definitionVisible = false;

      const quizData = getCurrentQuiz();
      const current = quizData[currentQuestion];
      const progress = ((currentQuestion + 1) / quizData.length) * 100;
      const weekText = selectedWeek === "week1" ? "Week 1" : "Week 2";

      document.getElementById("topic").textContent = current.topic;
      document.getElementById("badge").textContent = weekText;

      document.getElementById("definition").textContent = current.definition;
      document.getElementById("definition").classList.remove("show");
      document.getElementById("definitionToggleBtn").textContent = "Show Definition";
      document.getElementById("definitionToggleBtn").style.display = "inline-block";

      document.getElementById("question").textContent = current.question;
      document.getElementById("feedback").textContent = "";
      document.getElementById("progressBar").style.width = progress + "%";
      document.getElementById("score").textContent = `Question ${currentQuestion + 1} of ${quizData.length} | Score: ${score}`;

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      current.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.textContent = option;
        button.className = "option";
        button.onclick = () => checkAnswer(index, button);
        optionsDiv.appendChild(button);
      });
    }

    function toggleDefinition() {
      const definitionBox = document.getElementById("definition");
      const button = document.getElementById("definitionToggleBtn");

      definitionVisible = !definitionVisible;

      if (definitionVisible) {
        definitionBox.classList.add("show");
        button.textContent = "Hide Definition";
      } else {
        definitionBox.classList.remove("show");
        button.textContent = "Show Definition";
      }
    }

    function checkAnswer(selectedIndex, selectedButton) {
      if (answered) return;
      answered = true;

      const quizData = getCurrentQuiz();
      const current = quizData[currentQuestion];
      const optionButtons = document.querySelectorAll(".option");

      optionButtons[current.answer].classList.add("correct");

      if (selectedIndex === current.answer) {
        score++;
        document.getElementById("feedback").textContent = "✅ Correct! Well done.";
      } else {
        selectedButton.classList.add("wrong");
        document.getElementById("feedback").textContent = "❌ Not correct. The correct answer is highlighted in green.";
      }

      document.getElementById("score").textContent = `Question ${currentQuestion + 1} of ${quizData.length} | Score: ${score}`;
    }

    function nextQuestion() {
      const quizData = getCurrentQuiz();

      if (currentQuestion < quizData.length - 1) {
        currentQuestion++;
        loadQuestion();
      } else {
        showFinalScore();
      }
    }

    function showFinalScore() {
      const quizData = getCurrentQuiz();
      const weekName = selectedWeek === "week1" ? "Week 1: Sanction Screening" : "Week 2: Introduction to Payment";
      const percentage = Math.round((score / quizData.length) * 100);

      document.getElementById("topic").textContent = "Quiz Complete";
      document.getElementById("badge").textContent = percentage + "%";
      document.getElementById("progressBar").style.width = "100%";

      document.getElementById("definition").innerHTML = `<div class="final-card">You have completed <strong>${weekName}</strong>.<br><br>Your final score is <strong>${score} out of ${quizData.length}</strong>.</div>`;
      document.getElementById("definition").classList.add("show");
      document.getElementById("definitionToggleBtn").style.display = "none";

      document.getElementById("question").textContent = "Great work — restart the quiz to practise again.";
      document.getElementById("options").innerHTML = "";
      document.getElementById("feedback").textContent = "";
      document.getElementById("score").textContent = "Click Restart Quiz to try again.";
    }

    function restartQuiz() {
      currentQuestion = 0;
      score = 0;
      loadQuestion();
    }

    loadQuestion();
  </script>
</body>
</html>
