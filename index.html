<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Crime Quiz App</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 25px;
      color: #1f2937;
      background:
        radial-gradient(circle at top left, rgba(147, 197, 253, 0.45), transparent 35%),
        radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.18), transparent 35%),
        linear-gradient(135deg, #b6c8df, #d9e3f2);
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 22px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    h1 {
      text-align: center;
      color: #1e3a8a;
      font-size: 42px;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 25px;
      font-size: 16px;
    }

    .week-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 25px;
      justify-content: center;
    }

    .week-btn {
      background: #eef2ff;
      color: #1e3a8a;
      border: 2px solid #1e3a8a;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .week-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(30, 58, 138, 0.2);
    }

    .week-btn.active {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .topic {
      font-size: 15px;
      color: #475569;
      font-weight: bold;
    }

    .badge {
      background: #dbeafe;
      color: #1e40af;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }

    .progress-wrap {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 20px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #2563eb);
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .definition-toggle {
      background: #dbeafe;
      color: #1e3a8a;
      border: 2px solid #1e3a8a;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .definition-toggle:hover {
      background: #bfdbfe;
    }

    .definition {
      display: none;
      background: linear-gradient(135deg, #eff6ff, #eef2ff);
      padding: 18px;
      border-left: 6px solid #2563eb;
      margin-bottom: 24px;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 17px;
    }

    .definition.show {
      display: block;
    }

    .question {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 18px;
      color: #111827;
    }

    .option {
      display: block;
      width: 100%;
      padding: 15px 16px;
      margin: 10px 0;
      border: 2px solid #d1d5db;
      border-radius: 14px;
      background: white;
      cursor: pointer;
      text-align: left;
      font-size: 17px;
      transition: 0.2s ease;
    }

    .option:hover {
      background: #f8fafc;
      transform: translateX(5px);
      border-color: #2563eb;
    }

    .correct {
      background: #dcfce7 !important;
      border-color: #22c55e !important;
      color: #14532d;
      font-weight: bold;
    }

    .wrong {
      background: #fee2e2 !important;
      border-color: #ef4444 !important;
      color: #7f1d1d;
      font-weight: bold;
    }

    #feedback {
      margin-top: 16px;
      font-weight: bold;
      font-size: 18px;
      min-height: 28px;
    }

    .buttons {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
    }

    #nextBtn {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      font-weight: bold;
    }

    #restartBtn {
      background: #475569;
      color: white;
      font-weight: bold;
    }

    #nextBtn:hover,
    #restartBtn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .score {
      margin-top: 18px;
      font-size: 16px;
      color: #334155;
      font-weight: bold;
    }

    .final-card {
      text-align: center;
      padding: 25px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ecfdf5, #eff6ff);
      border: 2px solid #bfdbfe;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .container {
        padding: 20px;
      }

      h1 {
        font-size: 30px;
      }

      .question {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Financial Crime Quiz App</h1>
    <p class="subtitle">Practise Week 1 and Week 2 questions interactively</p>

    <div class="week-buttons">
      <button class="week-btn active" id="week1Btn" onclick="selectWeek('week1')">Week 1: Sanction Screening</button>
      <button class="week-btn" id="week2Btn" onclick="selectWeek('week2')">Week 2: Introduction to Payment</button>
    </div>

    <div class="top-row">
      <div class="topic" id="topic"></div>
      <div class="badge" id="badge"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <button class="definition-toggle" id="definitionToggleBtn" onclick="toggleDefinition()">Show Definition</button>
    <div class="definition" id="definition"></div>

    <div class="question" id="question"></div>
    <div id="options"></div>
    <div id="feedback"></div>

    <div class="buttons">
      <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
      <button id="restartBtn" onclick="restartQuiz()">Restart Quiz</button>
    </div>

    <div class="score" id="score"></div>
  </div>

  <script>
    const quizzes = {
      week1: [
        {
          topic: "Week 1 - 1. Sanction Screening",
          definition: "Sanction screening is the process of checking individuals, businesses, and transactions against official sanctions lists to prevent dealings with restricted or high-risk parties.",
          question: "Sanction screening checks:",
          options: ["Only transactions", "Only individuals", "Individuals, businesses, and transactions", "Only bank accounts"],
          answer: 2
        },
        {
          topic: "Week 1 - 1. Sanction Screening",
          definition: "Sanction screening is the process of checking individuals, businesses, and transactions against official sanctions lists to prevent dealings with restricted or high-risk parties.",
          question: "The purpose of sanction screening is to:",
          options: ["Increase bank profits", "Prevent dealings with restricted or high-risk parties", "Speed up payments", "Reduce transaction fees"],
          answer: 1
        },
        {
          topic: "Week 1 - Categories of Financial Crime",
          definition: "Categories of financial crime: Crime narcotics, Crime terror, Money laundering, Illegal weapons dealing, Shell companies.",
          question: "Which of the following is a category of financial crime?",
          options: ["Internet banking", "Crime narcotics", "Payment routing", "SWIFT"],
          answer: 1
        }
      ],

      week2: [
        {
          topic: "Week 2 - 1. Request for transfer of funds",
          definition: "A payment is the initiation of a transfer where one party instructs their bank to move money from one account to another.",
          question: "A payment is:",
          options: ["A completed transaction between banks", "The initiation of a transfer where one party instructs their bank to move money from one account to another", "A request for a loan", "A record of past transactions"],
          answer: 1
        },
        {
          topic: "Week 2 - 2. Payment Channels",
          definition: "Payments can be initiated through different channels such as internet banking, phone banking, or Electronic Funds Transfers (EFTs).",
          question: "Payments can be initiated through:",
          options: ["Only internet banking", "Only phone banking", "Different channels such as internet banking, phone banking, or EFTs", "Only cash"],
          answer: 2
        }
      ]
    };

    let selectedWeek = "week1";
    let currentQuestion = 0;
    let score = 0;
    let answered = false;
    let definitionVisible = false;

    function getCurrentQuiz() {
      return quizzes[selectedWeek];
    }

    function selectWeek(week) {
      selectedWeek = week;
      currentQuestion = 0;
      score = 0;

      document.getElementById("week1Btn").classList.remove("active");
      document.getElementById("week2Btn").classList.remove("active");
      document.getElementById(week + "Btn").classList.add("active");

      loadQuestion();
    }

    function loadQuestion() {
      answered = false;
      definitionVisible = false;

      const quizData = getCurrentQuiz();
      const current = quizData[currentQuestion];
      const progress = ((currentQuestion + 1) / quizData.length) * 100;
      const weekText = selectedWeek === "week1" ? "Week 1" : "Week 2";

      document.getElementById("topic").textContent = current.topic;
      document.getElementById("badge").textContent = weekText;

      const definitionBox = document.getElementById("definition");
      definitionBox.textContent = current.definition;
      definitionBox.classList.remove("show");

      const definitionBtn = document.getElementById("definitionToggleBtn");
      definitionBtn.textContent = "Show Definition";
      definitionBtn.style.display = "inline-block";

      document.getElementById("question").textContent = current.question;
      document.getElementById("feedback").textContent = "";
      document.getElementById("progressBar").style.width = progress + "%";
      document.getElementById("score").textContent = `Question ${currentQuestion + 1} of ${quizData.length} | Score: ${score}`;

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      current.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.textContent = option;
        button.className = "option";
        button.onclick = () => checkAnswer(index, button);
        optionsDiv.appendChild(button);
      });
    }

    function toggleDefinition() {
      const definitionBox = document.getElementById("definition");
      const button = document.getElementById("definitionToggleBtn");

      definitionVisible = !definitionVisible;

      if (definitionVisible) {
        definitionBox.classList.add("show");
        button.textContent = "Hide Definition";
      } else {
        definitionBox.classList.remove("show");
        button.textContent = "Show Definition";
      }
    }

    function checkAnswer(selectedIndex, selectedButton) {
      if (answered) return;
      answered = true;

      const quizData = getCurrentQuiz();
      const current = quizData[currentQuestion];
      const optionButtons = document.querySelectorAll(".option");

      optionButtons[current.answer].classList.add("correct");

      if (selectedIndex === current.answer) {
        score++;
        document.getElementById("feedback").textContent = "✅ Correct! Well done.";
      } else {
        selectedButton.classList.add("wrong");
        document.getElementById("feedback").textContent = "❌ Not correct. The correct answer is highlighted in green.";
      }

      document.getElementById("score").textContent = `Question ${currentQuestion + 1} of ${quizData.length} | Score: ${score}`;
    }

    function nextQuestion() {
      const quizData = getCurrentQuiz();

      if (currentQuestion < quizData.length - 1) {
        currentQuestion++;
        loadQuestion();
      } else {
        showFinalScore();
      }
    }

    function showFinalScore() {
      const quizData = getCurrentQuiz();
      const weekName = selectedWeek === "week1" ? "Week 1: Sanction Screening" : "Week 2: Introduction to Payment";

      document.getElementById("topic").textContent = "Quiz Complete";
      document.getElementById("badge").textContent = Math.round((score / quizData.length) * 100) + "%";
      document.getElementById("progressBar").style.width = "100%";

      const definitionBox = document.getElementById("definition");
      definitionBox.innerHTML = `<div class="final-card">You have completed <strong>${weekName}</strong>.<br><br>Your final score is <strong>${score} out of ${quizData.length}</strong>.</div>`;
      definitionBox.classList.add("show");

      document.getElementById("definitionToggleBtn").style.display = "none";
      document.getElementById("question").textContent = "Great work — restart the quiz to practise again.";
      document.getElementById("options").innerHTML = "";
      document.getElementById("feedback").textContent = "";
      document.getElementById("score").textContent = "Click Restart Quiz to try again.";
    }

    function restartQuiz() {
      currentQuestion = 0;
      score = 0;
      loadQuestion();
    }

    loadQuestion();
  </script>
</body>
</html>
